<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – Fast Image Tools</title>
    <meta name="description" content="Read the latest articles and guides about image editing, optimization, and online tools.">
    <link rel="canonical" href="https://fastimgtool.com/blog/">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" href="/assets/favicon.png">
    <!-- Preconnect for AdSense -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com">
    <link rel="preconnect" href="https://googleads.g.doubleclick.net">
    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8332278519903196" crossorigin="anonymous"></script>
    <style>
        .navbar, .footer { background: #0b1225; border-color: #1e293b; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: #111a30; border-radius: 12px; }
        .post-list { list-style: none; padding: 0; }
        .post-item { margin-bottom: 20px; }
        .post-item a { color: #4da3ff; font-size: 1.2rem; text-decoration: none; }
        .post-item a:hover { text-decoration: underline; }
        .post-date { color: #a0b3d9; font-size: 0.9rem; margin-left: 10px; }
    </style>
</head>
<body>
    <!-- Navbar (same as index.html) -->
    <nav class="navbar">
        <div class="logo"><a href="/">⚡ FastImageTool</a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
            <a href="/guides/">Guides</a>
            <a href="/blog/">Blog</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
            <a href="/community.html">Community</a>
        </div>
    </nav>

    <main class="container">
        <h1>Blog</h1>
        <ul class="post-list">
            {{posts}}
        </ul>
    </main>

    <!-- Footer (same as index.html) -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-col">
                <h4>Product</h4>
                <ul>
                    <li><a href="/tools/">All Tools</a></li>
                    <li><a href="/guides/">All Guides</a></li>
                    <li><a href="/blog/">Blog</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>Legal</h4>
                <ul>
                    <li><a href="/privacy.html">Privacy policy</a></li>
                    <li><a href="/terms.html">Terms & conditions</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>Company</h4>
                <ul>
                    <li><a href="/about.html">About us</a></li>
                    <li><a href="/contact.html">Contact us</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 FastImgTool – All rights reserved.</p>
        </div>
    </footer>
    <script src="/assets/js/nav.js"></script>
</body>
</html>
