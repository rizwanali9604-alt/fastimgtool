<script>

window.addEventListener("load",()=>{
document.querySelectorAll(".adsbygoogle").forEach(()=>{
(adsbygoogle = window.adsbygoogle || []).push({});
});
});

let currentFile=null
let previewUrl=null
let converting=false

const uploadArea=document.getElementById("uploadArea")
const fileInput=document.getElementById("fileInput")
const convertBtn=document.getElementById("convertBtn")
const statusEl=document.getElementById("status")
const preview=document.getElementById("preview")
const imgPreview=document.getElementById("imgPreview")
const fileinfo=document.getElementById("fileinfo")

uploadArea.onclick=()=>fileInput.click()

uploadArea.ondragover=e=>{
e.preventDefault()
uploadArea.classList.add("dragover")
}

uploadArea.ondragleave=()=>uploadArea.classList.remove("dragover")

uploadArea.ondrop=e=>{
e.preventDefault()
uploadArea.classList.remove("dragover")
handleFile(e.dataTransfer.files[0])
}

fileInput.onchange=e=>handleFile(e.target.files[0])

function handleFile(file){

if(!file)return

if(!file.type.includes("webp")){
alert("Upload WEBP image")
return
}

currentFile=file
convertBtn.disabled=false
preview.style.display="none"

fileinfo.innerText=`${file.name} • ${(file.size/1024).toFixed(1)} KB`
statusEl.innerText="Ready to convert"

}

convertBtn.onclick=()=>{

if(converting||!currentFile)return
converting=true

convertBtn.disabled=true
statusEl.innerText="Converting..."

const img=new Image()
const url=URL.createObjectURL(currentFile)

img.onload=()=>{

URL.revokeObjectURL(url)

const canvas=document.createElement("canvas")
canvas.width=img.width
canvas.height=img.height

const ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0)

canvas.toBlob(blob=>{

const downloadUrl=URL.createObjectURL(blob)

imgPreview.src=downloadUrl
preview.style.display="block"

const newName=currentFile.name.replace(/\.webp$/i,".jpg")

const a=document.createElement("a")
a.href=downloadUrl
a.download=newName
a.click()

previewUrl=downloadUrl

statusEl.innerText="Conversion complete"

convertBtn.disabled=false
converting=false

},"image/jpeg",0.92)

}

img.onerror=()=>{
alert("Invalid image")
reset()
}

img.src=url

}

function reset(){
currentFile=null
convertBtn.disabled=true
statusEl.innerText=""
preview.style.display="none"
converting=false
}

window.addEventListener("beforeunload",()=>{
if(previewUrl)URL.revokeObjectURL(previewUrl)
})

</script>
