<style>
:root{
--bg:#050b18;
--card:#0b1225;
--border:#1e293b;
--text:#e6edf7;
--muted:#94a3b8;
--accent:#4da3ff;

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

header{text-align:center;margin:40px 0 20px}
header a{text-decoration:none}

h1{
font-size:2.4rem;
background:linear-gradient(135deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{color:var(--muted);margin-top:8px}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:35px;
box-shadow:0 0 40px rgba(0,60,255,.12);
margin-top:30px;
}

.upload{
border:2px dashed #334155;
padding:35px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.2s;
}
.upload:hover{border-color:#3b82f6;background:#020617}

.controls{display:flex;gap:15px;margin-top:20px;flex-wrap:wrap}
.controls div{flex:1;min-width:140px}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:white;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
background:linear-gradient(135deg,var(--accent),var(--accent2));
cursor:pointer;
}

button:disabled{background:#475569}

.preview{
display:none;
margin-top:25px;
text-align:center;
}

.preview img{
max-width:100%;
max-height:260px;
border-radius:12px;
margin-top:10px;
}

.note{font-size:.85rem;color:#9ca3af;margin-top:10px}

.ad{margin:40px 0;display:flex;justify-content:center;min-height:90px}

footer{
margin-top:60px;
padding:30px 0;
text-align:center;
color:#64748b;
border-top:1px solid var(--border);
font-size:.9rem;
}
footer a{color:#60a5fa;text-decoration:none;margin:0 6px}

<body>
<div class="container">

<header>
<a href="/"><h1>⚡ ToolForge</h1></a>
<div class="sub">Fast • Private • Browser-Based Tools</div>
</header>

data-ad-format="auto"
data-full-width-responsive="true"></ins>
</div>

<div class="card">
<h2>📏 Image Resizer</h2>

<div class="upload" id="drop">Click or Drag Image Here</div>
<input type="file" id="upload" accept="image/*" hidden>

<div class="controls">
<div>
<label>Width</label>
<input type="number" id="width">
</div>
<div>
<label>Height</label>
<input type="number" id="height">
</div>
</div>

<label style="margin-top:10px">
<input type="checkbox" id="ratio" checked> Maintain aspect ratio
</label>

<button id="resizeBtn" disabled>Resize & Download</button>
<div class="note">Private processing. No image leaves your device.</div>

<div class="preview" id="preview">
<h3>Preview</h3>
<img id="imgPreview">
</div>

<div class="ad">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-8332278519903196"
data-ad-slot="8664200172"

data-full-width-responsive="true"></ins>
</div>

<footer>
© 2026 ToolForge —

</footer>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
// ads
window.addEventListener("load",()=>{
document.querySelectorAll(".adsbygoogle").forEach(()=>{
(adsbygoogle = window.adsbygoogle || []).push({});
});
});

const drop=document.getElementById("drop");
const upload=document.getElementById("upload");
const w=document.getElementById("width");
const h=document.getElementById("height");
const ratio=document.getElementById("ratio");
const btn=document.getElementById("resizeBtn");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const preview=document.getElementById("preview");
const imgPreview=document.getElementById("imgPreview");

let file,origW,origH;

drop.onclick=()=>upload.click();
drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
e.preventDefault();
handle(e.dataTransfer.files[0]);
};

upload.onchange=e=>handle(e.target.files[0]);

function handle(f){
if(!f||!f.type.startsWith("image/")){alert("Upload image");return;}
file=f;
btn.disabled=false;

const img=new Image();
img.onload=()=>{
origW=img.width;
origH=img.height;
w.value=origW;
h.value=origH;
};
img.src=URL.createObjectURL(f);
}

w.oninput=()=>{
if(ratio.checked&&origW){
h.value=Math.round((w.value/origW)*origH);
}
};
h.oninput=()=>{
if(ratio.checked&&origH){
w.value=Math.round((h.value/origH)*origW);
}
};

btn.onclick=()=>{
if(!file)return;

btn.disabled=true;
btn.textContent="Processing...";

const img=new Image();
const url=URL.createObjectURL(file);

img.onload=()=>{
canvas.width=w.value;
canvas.height=h.value;
ctx.drawImage(img,0,0,w.value,h.value);

canvas.toBlob(blob=>{
const out=URL.createObjectURL(blob);
imgPreview.src=out;
preview.style.display="block";

const a=document.createElement("a");
a.href=out;
a.download=`resized_${w.value}x${h.value}.png`;
a.click();

URL.revokeObjectURL(out);
URL.revokeObjectURL(url);

btn.disabled=false;
btn.textContent="Resize & Download";
},"image/png",0.92);
};

img.src=url;
};
</script>

</body>
</html>
