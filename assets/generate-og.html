<!DOCTYPE html>
<html>
<head><title>Generate OG Image</title></head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<button onclick="download()">Download og-image.png</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Background
ctx.fillStyle = '#7C3AED';
ctx.fillRect(0, 0, 1200, 630);

// White overlay box
ctx.fillStyle = 'rgba(255,255,255,0.1)';
ctx.fillRect(60, 60, 1080, 510);

// Logo text
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 52px system-ui';
ctx.fillText('⚡ FastImageTool', 100, 200);

// Tagline
ctx.font = '32px system-ui';
ctx.fillStyle = 'rgba(255,255,255,0.9)';
ctx.fillText('Free Image Tools for Meesho & Amazon Sellers', 100, 280);

// Sub text
ctx.font = '24px system-ui';
ctx.fillStyle = 'rgba(255,255,255,0.7)';
ctx.fillText('Compress • Resize • Convert • No Signup Required', 100, 340);

// Bottom bar
ctx.fillStyle = 'rgba(0,0,0,0.2)';
ctx.fillRect(0, 540, 1200, 90);
ctx.fillStyle = '#ffffff';
ctx.font = '22px system-ui';
ctx.fillText('fastimgtool.com', 100, 595);

function download() {
  const link = document.createElement('a');
  link.download = 'og-image.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
