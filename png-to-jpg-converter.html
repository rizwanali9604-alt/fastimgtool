<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

window.addEventListener("load",()=>{
document.querySelectorAll(".adsbygoogle").forEach(()=>{
(adsbygoogle=window.adsbygoogle||[]).push({});
});
});

if(typeof JSZip==="undefined"){
alert("Conversion library failed to load. Please refresh.");
}

const uploadArea=document.getElementById("uploadArea");
const fileInput=document.getElementById("fileInput");
const convertBtn=document.getElementById("convertBtn");
const fileCount=document.getElementById("fileCount");
const progress=document.getElementById("progress");

let files=[];

const MAX_FILES=50;
const MAX_DIMENSION=8000;
const CONCURRENT_LIMIT=3;

uploadArea.onclick=()=>fileInput.click();

uploadArea.ondragover=e=>{
e.preventDefault();
uploadArea.classList.add("dragover");
};

uploadArea.ondragleave=()=>{
uploadArea.classList.remove("dragover");
};

uploadArea.ondrop=e=>{
e.preventDefault();
uploadArea.classList.remove("dragover");
handleFiles(e.dataTransfer.files);
};

fileInput.onchange=e=>handleFiles(e.target.files);

function handleFiles(selected){

let png=[...selected].filter(f=>f.type==="image/png");

if(png.length===0){
alert("Please upload PNG images.");
return;
}

if(png.length>MAX_FILES){
alert("Maximum "+MAX_FILES+" images allowed.");
return;
}

files=png;

convertBtn.disabled=false;

fileCount.innerText=files.length+" PNG file(s) ready";

progress.innerText="";
}

convertBtn.onclick=async()=>{

convertBtn.disabled=true;
convertBtn.innerText="Processing...";

let zip=new JSZip();

let index=0;
let done=0;

async function worker(){

while(index<files.length){

let file=files[index++];

try{
let blob=await convert(file);

zip.file(file.name.replace(/\.png$/i,".jpg"),blob);

}catch(e){
console.warn(e);
}

done++;

let percent=Math.round(done/files.length*100);

progress.innerText=`Converting ${done}/${files.length} (${percent}%)`;

}
}

let workers=[];

for(let i=0;i<CONCURRENT_LIMIT;i++){
workers.push(worker());
}

await Promise.all(workers);

progress.innerText="Creating ZIP...";

let content=await zip.generateAsync({type:"blob"});

let link=document.createElement("a");
link.href=URL.createObjectURL(content);
link.download="converted-"+Date.now()+".zip";
link.click();

URL.revokeObjectURL(link.href);

convertBtn.disabled=false;
convertBtn.innerText="Convert & Download ZIP";

progress.innerText="✅ Finished!";
};

function convert(file){

return new Promise((resolve,reject)=>{

const url=URL.createObjectURL(file);
const img=new Image();

img.onload=()=>{

URL.revokeObjectURL(url);

let w=img.width;
let h=img.height;

if(w>MAX_DIMENSION||h>MAX_DIMENSION){

const ratio=Math.min(MAX_DIMENSION/w,MAX_DIMENSION/h);

w=Math.round(w*ratio);
h=Math.round(h*ratio);

}

const canvas=document.createElement("canvas");
canvas.width=w;
canvas.height=h;

const ctx=canvas.getContext("2d",{alpha:false});

ctx.drawImage(img,0,0,w,h);

canvas.toBlob(blob=>{
if(!blob)reject();
else resolve(blob);
},"image/jpeg",0.92);

};

img.onerror=()=>reject();

img.src=url;

});

}

</script>
