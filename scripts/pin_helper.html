<!DOCTYPE html>
<html>
<head>
    <title>Pin Helper – FastImgTool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .pin { border: 1px solid #ccc; background: white; margin: 15px 0; padding: 15px; border-radius: 8px; }
        h3 { margin: 0 0 10px; color: #333; }
        .field { margin: 5px 0; }
        .field label { font-weight: bold; display: inline-block; width: 100px; }
        .field .value { font-family: monospace; word-break: break-all; background: #f9f9f9; padding: 4px; border-radius: 4px; display: inline-block; max-width: 80%; }
        button { margin: 8px 8px 0 0; padding: 5px 12px; cursor: pointer; background: #4da3ff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #2c7fcf; }
        .copied { background: #2c7fcf; opacity: 0.7; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Manual Pinterest Pin Helper</h1>
    <p>Click a button to copy that field. Then paste into Pinterest's pin creator.</p>
    <div id="pins"></div>

    <script>
        fetch('batch_rest.csv')
            .then(response => response.text())
            .then(csvText => {
                const rows = csvText.split('\n').slice(1).filter(r => r.trim());
                const pins = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        title: cols[0]?.replace(/^"|"$/g, '').trim(),
                        description: cols[1]?.replace(/^"|"$/g, '').trim(),
                        link: cols[2]?.replace(/^"|"$/g, '').trim(),
                        imageUrl: cols[3]?.replace(/^"|"$/g, '').trim(),
                        board: cols[4]?.replace(/^"|"$/g, '').trim()
                    };
                });

                const container = document.getElementById('pins');
                pins.forEach((pin, idx) => {
                    const div = document.createElement('div');
                    div.className = 'pin';
                    div.innerHTML = `
                        <h3>Pin ${idx+1}</h3>
                        <div class="field"><label>Image URL:</label> <span class="value" id="img-${idx}">${pin.imageUrl}</span> <button onclick="copyToClipboard('img-${idx}')">Copy</button></div>
                        <div class="field"><label>Title:</label> <span class="value" id="title-${idx}">${pin.title}</span> <button onclick="copyToClipboard('title-${idx}')">Copy</button></div>
                        <div class="field"><label>Description:</label> <span class="value" id="desc-${idx}">${pin.description}</span> <button onclick="copyToClipboard('desc-${idx}')">Copy</button></div>
                        <div class="field"><label>Link:</label> <span class="value" id="link-${idx}">${pin.link}</span> <button onclick="copyToClipboard('link-${idx}')">Copy</button></div>
                        <button onclick="openPinterest()">Open Pinterest Pin Creator</button>
                        <hr>
                    `;
                    container.appendChild(div);
                });
            });

        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1000);
            });
        }

        function openPinterest() {
            window.open('https://www.pinterest.com/pin-creator/', '_blank');
        }
    </script>
</body>
</html>
