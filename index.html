<!DOCTYPE html>
<html>
<head>
  <title>Fast Image Compressor</title>
</head>
<body style="text-align:center;font-family:Arial;padding:40px">

<h1>Free Image Compressor</h1>
<p>Upload image and reduce file size instantly</p>

<input type="file" id="upload" accept="image/*"><br><br>

<canvas id="canvas" style="display:none;"></canvas>

<button onclick="compress()">Compress Image</button>

<br><br>

<a id="download" style="display:none">Download Compressed Image</a>

<script>
function compress(){
  const file = document.getElementById("upload").files[0];
  if(!file){ alert("Upload image first"); return; }

  const reader = new FileReader();

  reader.onload = function(e){
    const img = new Image();
    img.src = e.target.result;

    img.onload = function(){
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img,0,0);

      const compressed = canvas.toDataURL("image/jpeg",0.5);

      const link = document.getElementById("download");
      link.href = compressed;
      link.download = "compressed.jpg";
      link.style.display="block";
      link.innerText="Download Image";
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
