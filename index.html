<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fast Image Compressor – Reduce JPG PNG WEBP Size Online</title>
<meta name="description" content="Compress images instantly. 100% private. No uploads. Supports JPG PNG WEBP.">

<!-- Ads Script (ONLY ONCE) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8332278519903196" crossorigin="anonymous"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
background:#050b18;
color:#e6edf7;
min-height:100vh;
display:flex;
flex-direction:column;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
width:100%;
}

header{
text-align:center;
margin:30px 0;
}

h1{
font-size:2.6rem;
background:linear-gradient(135deg,#4da3ff,#003cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#94a3b8;
margin-top:10px;
}

.card{
background:#0b1225;
border:1px solid #1e293b;
border-radius:18px;
padding:30px;
box-shadow:0 0 40px rgba(0,60,255,.15);
margin-top:25px;
}

.upload{
border:2px dashed #334155;
padding:40px;
text-align:center;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.upload:hover{
border-color:#3b82f6;
background:#020617;
}

.controls{
margin-top:20px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

input[type=range]{
width:100%;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px 30px;
border-radius:40px;
font-weight:600;
margin-top:25px;
cursor:pointer;
width:100%;
max-width:260px;
display:block;
margin-left:auto;
margin-right:auto;
}

button:disabled{
background:#475569;
cursor:not-allowed;
}

.preview{
display:none;
margin-top:25px;
text-align:center;
}

.preview img{
max-width:100%;
max-height:220px;
border-radius:10px;
margin-top:10px;
}

.download{
display:inline-block;
margin-top:15px;
background:#020617;
padding:14px 28px;
border-radius:40px;
color:white;
text-decoration:none;
border:1px solid #334155;
}

.ad{
margin:35px 0;
display:flex;
justify-content:center;
}

footer{
margin-top:40px;
padding:25px;
text-align:center;
color:#64748b;
border-top:1px solid #1e293b;
}

@media(max-width:600px){
h1{font-size:2rem}
}
</style>
</head>
<body>

<div class="container">

<header>
<h1>⚡ Fast Image Compressor</h1>
<div class="sub">Private • Instant • No Uploads</div>
</header>

<!-- TOP AD -->
<div class="ad">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-8332278519903196"
data-ad-slot="9490701260"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<div class="card">

<div class="upload" id="upload">
Click or Drop Image
</div>
<input type="file" id="file" accept="image/*" hidden>

<div class="controls">
<div style="flex:1">
<label>Quality <span id="qv">80</span>%</label>
<input type="range" id="quality" min="10" max="100" value="80">
</div>

<div style="flex:1">
<label>Format</label>
<select id="format" style="width:100%;padding:8px;border-radius:8px">
<option value="image/jpeg">JPEG</option>
<option value="image/png">PNG</option>
<option value="image/webp">WEBP</option>
</select>
</div>
</div>

<button id="compress" disabled>Compress</button>

<div class="preview" id="preview">
<h3>Preview</h3>
<img id="img">
<br>
<a id="download" class="download">Download</a>
</div>

</div>

<!-- MIDDLE AD -->
<div class="ad">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-8332278519903196"
data-ad-slot="8664200172"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<footer>
© 2026 fastimgtool.com — All processing happens locally in your browser
</footer>

</div>

<script>
const upload=document.getElementById("upload");
const fileInput=document.getElementById("file");
const btn=document.getElementById("compress");
const q=document.getElementById("quality");
const qv=document.getElementById("qv");
const preview=document.getElementById("preview");
const img=document.getElementById("img");
const download=document.getElementById("download");
const format=document.getElementById("format");

let file;

q.oninput=()=>qv.textContent=q.value;

upload.onclick=()=>fileInput.click();

upload.ondrop=e=>{
e.preventDefault();
file=e.dataTransfer.files[0];
btn.disabled=false;
};

upload.ondragover=e=>e.preventDefault();

fileInput.onchange=e=>{
file=e.target.files[0];
btn.disabled=false;
};

btn.onclick=()=>{
const reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=e=>{
const image=new Image();
image.src=e.target.result;

image.onload=()=>{
const canvas=document.createElement("canvas");
canvas.width=image.width;
canvas.height=image.height;
const ctx=canvas.getContext("2d");
ctx.drawImage(image,0,0);

canvas.toBlob(blob=>{
const url=URL.createObjectURL(blob);
img.src=url;
download.href=url;
download.download="compressed."+format.value.split("/")[1];
preview.style.display="block";
},format.value,q.value/100);
};
};
};
</script>

</body>
</html>
