<script>
window.addEventListener("load", () => {
  document.querySelectorAll(".adsbygoogle").forEach(() => {
    (adsbygoogle = window.adsbygoogle || []).push({});
  });
});

const upload=document.getElementById("upload");
const fileInput=document.getElementById("file");
const btn=document.getElementById("compress");
const q=document.getElementById("quality");
const qv=document.getElementById("qv");
const preview=document.getElementById("preview");
const format=document.getElementById("format");

let file=null;
let url=null;

q.addEventListener("input",()=>qv.textContent=q.value);

upload.addEventListener("click",()=>fileInput.click());
upload.addEventListener("dragover",e=>e.preventDefault());

upload.addEventListener("drop",e=>{
e.preventDefault();
handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change",e=>{
handleFile(e.target.files[0]);
});

function handleFile(f){
if(!f || !f.type.startsWith("image/")){
alert("Please upload image file");
return;
}
if(f.size>20*1024*1024){
alert("Max file size 20MB");
return;
}
file=f;
btn.disabled=false;
}

btn.addEventListener("click",()=>{
if(!file)return;

const reader=new FileReader();

reader.onload=e=>{
const image=new Image();
image.src=e.target.result;

image.onload=()=>{
const canvas=document.createElement("canvas");
canvas.width=image.width;
canvas.height=image.height;
const ctx=canvas.getContext("2d");
ctx.drawImage(image,0,0);

canvas.toBlob(blob=>{

if(url) URL.revokeObjectURL(url);

const newUrl = URL.createObjectURL(blob);
url = newUrl;

setTimeout(() => {
 URL.revokeObjectURL(newUrl);
}, 10000);

const before=(file.size/1024).toFixed(1)+" KB";
const after=(blob.size/1024).toFixed(1)+" KB";

preview.innerHTML=`
<h3>Preview</h3>
<img src="${url}">
<p style="margin-top:10px;color:#94a3b8">
Original: ${before} → Compressed: ${after}
</p>
<a href="${url}" download="compressed.${format.value.split('/')[1]}" class="download">
Download Image
</a>
`;

preview.style.display="block";

},format.value,
format.value==="image/png"?undefined:q.value/100);

};
};

reader.readAsDataURL(file);
});
</script>
