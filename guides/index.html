<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Guides – Fast Image Tools</title>
    <meta name="description" content="Learn how to resize, compress, convert, and edit images with our free guides.">
    <link rel="canonical" href="https://fastimgtool.com/guides/">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" href="/assets/favicon.png">
    <style>
        .navbar, .footer { background: #0b1225; border-color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        .guides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .guide-card {
            background: #111a30;
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            padding: 20px;
        }
        .guide-card h3 a {
            color: #4da3ff;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .guide-card h3 a:hover {
            text-decoration: underline;
        }
        .guide-card p {
            color: #a0b3d9;
            font-size: 0.9rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- REPLACE WITH ACTUAL NAVBAR -->
    <nav class="navbar">
        <div class="logo"><a href="/">⚡ FastImageTool</a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
            <a href="/guides/">Guides</a>
            <a href="/blog/">Blog</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </div>
    </nav>

    <main class="container">
        <h1>All Guides</h1>
        <div id="guides-container" class="guides-grid">
            Loading guides...
        </div>
    </main>

    <!-- REPLACE WITH ACTUAL FOOTER -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-col">
                <h4>Product</h4>
                <ul>
                    <li><a href="/tools/">All Tools</a></li>
                    <li><a href="/guides/">All Guides</a></li>
                    <li><a href="/blog/">Blog</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>Legal</h4>
                <ul>
                    <li><a href="/privacy.html">Privacy policy</a></li>
                    <li><a href="/terms.html">Terms & conditions</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>Company</h4>
                <ul>
                    <li><a href="/about.html">About us</a></li>
                    <li><a href="/contact.html">Contact us</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 FastImgTool – All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadGuides() {
            const res = await fetch('/data/guides.json');
            const guides = await res.json();
            let html = '';
            guides.forEach(guide => {
                html += `
                    <div class="guide-card">
                        <h3><a href="${guide.url}">${guide.title}</a></h3>
                        <p>${guide.description || 'Learn more...'}</p>
                    </div>
                `;
            });
            document.getElementById('guides-container').innerHTML = html;
        }
        loadGuides();
    </script>
</body>
</html>
